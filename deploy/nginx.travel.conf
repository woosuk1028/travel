# /etc/nginx/sites-available/travel
# Replace REPLACE_DOMAIN_OR_IP and REPLACE_REPO_PATH before applying.
# After installing TLS via certbot this file is rewritten — re-apply changes if needed.

server {
    listen 80;
    server_name REPLACE_DOMAIN_OR_IP;

    # Multer cap is 10MB; 15M leaves headroom for the multipart envelope.
    client_max_body_size 15M;

    # Uploaded photos: served directly by Nginx, faster than NestJS static.
    location /uploads/ {
        alias REPLACE_REPO_PATH/nest/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # NestJS API
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Next.js (everything else)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_cache_bypass                 $http_upgrade;
    }
}
